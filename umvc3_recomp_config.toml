# umvc3_recomp - ReXGlue Codegen Configuration
# Generated by: rexglue init
# See README.md for full configuration reference.

project_name = "umvc3_recomp"
file_path = "assets/default.xex"
out_directory_path = "generated"

# Manual function entries for unresolved calls  
[functions]
0x82B38A60 = { size = 0x20 } 
0x825728F4 = { size = 0x100 }
0x8278F128 = { size = 0x20 }
0x82AAD168 = { size = 0x20 }
# Força a descoberta do destino do pulo condicional que travou o codegen
0x82F955EC = { size = 0x20 }
# Callbacks de input/update chamados via CTR da rotina 0x8277d3c8 (lr=0x8277D3CC)
# Não descobertos pelo codegen estático (só referenciados via ponteiros em dados)
0x8278C708 = { size = 0x10 }
0x8278C718 = { size = 0x20 }
# 0x82ECAD68: mid-gap entre sub_82ECAD50 e sub_82ECAD80 — chamado como vtable fn ptr
# lr=0x82ea77e0 ctr=0x82ecad68 r4=0x7018d4c0 (GPU render target), 3x consecutivo
# Codegen gerou sub_82ECAD50 + sub_82ECAD80 mas não este endereço intermediário
0x82ECAD68 = { size = 0x20 }

[symbols]
"xam:0x0AFF" = { name = "XamPartyGetUserList", type = "function" }
"xam:0x0B00" = { name = "XamPartySendGameInvites", type = "function" }
